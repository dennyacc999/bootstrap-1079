<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar di Amikom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            max-width: 900px;
            width: 100%;
            align-items: center;
            padding: 20px;
        }

        /* Bagian Gambar Kiri */
        .image-section {
            flex: 1;
            text-align: center;
        }

        .image-section img {
            max-width: 100%;
            height: auto;
        }

        /* Bagian Form Kanan */
        .form-section {
            flex: 1;
            padding: 20px;
            text-align: center;
        }

        .form-card {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #0084cc;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #f0f0f0;
            box-sizing: border-box; /* Agar padding tidak merusak lebar */
        }

        .checkbox-group {
            font-size: 12px;
            text-align: left;
            margin-bottom: 20px;
            color: #666;
        }

        .btn-daftar {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #e0e0e0;
            color: #888;
            font-weight: bold;
            cursor: pointer;
        }

        /* Tombol Sosial Media */
        .social-login {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-social {
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            color: white;
        }

        .facebook { background-color: #3b5998; }
        .google { background-color: #f1f1f1; color: #333; border: 1px solid #ddd; }

        .footer-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .footer-link a {
            color: #0084cc;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-section">
        <img src="gmbr amikom orang.jpeg" alt="Mahasiswa Amikom">
    </div>

    <div class="form-section">
        <h2>Daftar di Amikom</h2>
        
        <div class="form-card">
            <form action="#">
                <div class="input-group">
                    <input type="text" placeholder="Nama lengkap">
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Email/nomor HP">
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Kata sandi">
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="syarat">
                    <label for="syarat">Dengan mencentang ini, kamu menyetujui <a href="#">Syarat & Ketentuan</a> kami.</label>
                </div>

                <button type="submit" class="btn-daftar">Daftar</button>
            </form>
        </div>

        <div class="social-login">
            <a href="#" class="btn-social facebook">
            <i class="fab fa-facebook-f" style="margin-right: 10px;"></i> Facebook
        </a>
        <a href="#" class="btn-social google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" style="margin-right: 10px;"> Google
        </a>
        </div>

        <div class="footer-link">
            Sudah terdaftar? <a href="#">Masuk</a>
        </div>
    </div>
</div>

</body>
</html>
