<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Website Berita v1</title>
    <style>
        /* CSS Reset: hapus margin bawaan browser biar mepet */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* --- Pengaturan Kontainer Utama (Kotak Besar) --- */
        .container {
            width: 1000px; /* Lebar total websitenya fixed */
            margin: 20px auto; /* Ketengahin websitenya, kasih jarak atas-bawah */
            border: 2px solid #5a7b9c; /* Border biru luar */
            display: flex; /* Pakai Flexbox buat susun header-body-footer */
            flex-direction: column;
            gap: 15px; /* Jarak antar bagian utama */
            padding: 10px; /* Jarak dalem border */
        }

        /* --- Styling Dasar Kotak-kotak --- */
        .box {
            border: 2px solid #5a7b9c; /* Border biru standar */
            display: flex; /* Buat ketengahin teks di dalem kotak */
            justify-content: center;
            align-items: center;
            font-weight: bold;
            text-align: center;
        }

        /* --- BAGIAN 1: Header (Navigasi & Slider) --- */
        .header {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-1 { background-color: #b8860b; color: #333; height: 30px; } /* Emas tua */
        .nav-2 { background-color: #619bd3; color: #333; height: 40px; } /* Biru muda */
        .slider { background-color: #f19246; color: #333; height: 180px; } /* Oranye */

        /* --- BAGIAN 2: Body (Konten Utama & Sidebar) --- */
        /* INI KUNCI UTAMANYA: Pakai CSS GRID */
        .main-body {
            display: grid;
            grid-template-columns: 2fr 1fr; /* Kiri 2/3 lebar, kanan 1/3 lebar */
            gap: 15px; /* Jarak antar kotak di dalem body */
        }

        /* Kolom Kiri (Konten) */
        .content-area {
            display: grid;
            grid-template-rows: 150px 150px 150px; /* Tinggi fixed buat content 1,2,3 */
            gap: 10px; /* Jarak antar content */
        }
        .content { background-color: #ffda70; color: #333; } /* Kuning */

        /* Kolom Kanan (Sidebar) */
        .sidebar-area {
            display: grid;
            grid-template-rows: repeat(2, 1fr); /* Bagi dua rata tinggi sidebarnya */
            gap: 10px;
        }
        .sidebar { background-color: #a4cc8c; color: #333; } /* Hijau */

        /* --- BAGIAN 3: Footer --- */
        .footer {
            display: grid;
            grid-template-rows: auto auto; /* Ikut tinggi konten dalemnya */
            gap: 5px;
        }
        .footer-1 { background-color: #c05d1a; color: #333; height: 100px; } /* Coklat tua */
        .footer-2 { background-color: #8c420e; color: white; height: 30px; font-size: 12px; } /* Coklat pekat */

    </style>
</head>
<body>

    <div class="container">

        <header class="header">
            <div class="box nav-1">Navigasi 1</div>
            <div class="box nav-2">Navigasi 2</div>
            <div class="box slider">Slider</div>
        </header>

        <div class="main-body">
            
            <div class="content-area">
                <div class="box content">Content 1</div>
                <div class="box content">Content 2</div>
                <div class="box content">Content 3</div>
            </div>

            <div class="sidebar-area">
                <div class="box sidebar">Sidebar 1</div>
                <div class="box sidebar">Sidebar 2</div>
            </div>

        </div>

        <footer class="footer">
            <div class="box footer-1">Footer 1</div>
            <div class="box footer-2">Footer 2</div>
        </footer>

    </div>

</body>
</html>
